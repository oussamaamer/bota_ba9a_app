name: botaba9a_app
description: "BOTABA9A - Smart Gas Bottle Monitoring System for Morocco"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.2.0

  # Dependency Injection
  get_it: ^7.7.0

  # Network
  dio: ^5.5.0+1
  connectivity_plus: ^6.0.3

  # Supabase
  supabase_flutter: ^2.6.0

  # Local Storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

  # Charts
  fl_chart: ^0.68.0

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1

  # Utilities
  intl: 0.20.2
  uuid: ^4.4.2
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

